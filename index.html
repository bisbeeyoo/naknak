<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAK NAK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            background: #fff;
            color: #1a1a1a;
            display: flex;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #0a0a0a;
                color: #e5e5e5;
            }
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            padding: 2rem 1.5rem;
            border-right: 2px solid #1a1a1a;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            background: #fff;
        }

        @media (prefers-color-scheme: dark) {
            .sidebar {
                background: #0a0a0a;
                border-right-color: #333;
            }
        }

        .logo-container {
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo-image {
            width: 100%;
            height: auto;
            margin-bottom: 1rem;
            max-width: 200px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-toggle {
            display: none;
            cursor: pointer;
            font-size: 20px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .profile-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            .profile-section {
                border-bottom-color: #333;
            }
        }

        .profile-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .profile-value {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .interests-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .interest-tag {
            background: #1a1a1a;
            color: white;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (prefers-color-scheme: dark) {
            .interest-tag {
                background: #e5e5e5;
                color: #0a0a0a;
            }
        }

        .sidebar-btn {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        @media (prefers-color-scheme: dark) {
            .sidebar-btn {
                background: #e5e5e5;
                color: #0a0a0a;
            }
        }

        .sidebar-btn:hover {
            opacity: 0.8;
        }

        /* Main Content */
        .main {
            margin-left: 280px;
            flex: 1;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            .header {
                border-bottom-color: #333;
            }
        }

        .header-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .header-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid #1a1a1a;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        @media (prefers-color-scheme: dark) {
            .header-btn {
                border-color: #e5e5e5;
                color: #e5e5e5;
            }
        }

        .header-btn:hover {
            background: #1a1a1a;
            color: white;
        }

        @media (prefers-color-scheme: dark) {
            .header-btn:hover {
                background: #e5e5e5;
                color: #0a0a0a;
            }
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            background: #f5f5f5;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        @media (prefers-color-scheme: dark) {
            .gallery-item {
                background: #1a1a1a;
                border-color: #333;
            }
        }

        .gallery-item:hover {
            transform: scale(1.03);
            border-color: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            .gallery-item:hover {
                border-color: #e5e5e5;
            }
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            .gallery-placeholder {
                color: #333;
            }
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: flex-end;
            padding: 1rem;
            opacity: 0;
            transition: all 0.3s;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
            background: rgba(0, 0, 0, 0.6);
        }

        .gallery-info {
            color: white;
        }

        .gallery-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .gallery-count {
            font-size: 10px;
            opacity: 0.8;
        }

        .gallery-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            padding: 2rem;
            overflow-y: auto;
        }

        .gallery-modal.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .gallery-modal-close {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            font-size: 32px;
            color: white;
            cursor: pointer;
            font-weight: 900;
            z-index: 101;
        }

        .gallery-modal-title {
            font-size: 20px;
            font-weight: 900;
            color: white;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin-bottom: 2rem;
        }

        .photo-item {
            aspect-ratio: 1;
            background: #333;
            overflow: hidden;
            border: 1px solid #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .photo-item:hover {
            border-color: #e5e5e5;
            transform: scale(1.05);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Photo Detail Modal */
        .photo-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 200;
            padding: 2rem;
        }

        .photo-detail-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-detail-content {
            max-width: 900px;
            width: 100%;
            color: white;
        }

        .photo-detail-image-container {
            position: relative;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .photo-detail-image {
            max-width: 600px;
            max-height: 600px;
            object-fit: contain;
        }

        .photo-nav-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 32px;
            padding: 1rem;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.2s;
        }

        .photo-nav-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .photo-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .photo-detail-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            font-size: 32px;
            color: white;
            cursor: pointer;
            font-weight: 900;
        }

        .photo-counter {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 2rem;
        }

        .comments-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
        }

        .comments-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .comment-input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .comment-input-group input {
            flex: 1;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 12px;
        }

        .comment-input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .comment-textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 12px;
            margin-bottom: 1rem;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        .comment-textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .comment-submit-btn {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .comment-submit-btn:hover {
            opacity: 0.8;
        }

        .comments-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            font-size: 12px;
        }

        .comment-author {
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #aaa;
        }

        .comment-text {
            color: #e5e5e5;
            line-height: 1.4;
            word-break: break-word;
        }

        .comment-delete {
            font-size: 10px;
            color: #999;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .comment-delete:hover {
            color: #f00;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 300;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        @media (prefers-color-scheme: dark) {
            .modal-content {
                background: #0a0a0a;
                color: #e5e5e5;
            }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            font-weight: 900;
        }

        .admin-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            .admin-section {
                border-bottom-color: #333;
            }
        }

        .admin-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            font-family: inherit;
        }

        @media (prefers-color-scheme: dark) {
            input[type="text"],
            textarea,
            select {
                background: #1a1a1a;
                border-color: #333;
                color: #e5e5e5;
            }
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 10px 20px;
            background: #1a1a1a;
            color: white;
            border: none;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }

        @media (prefers-color-scheme: dark) {
            .btn {
                background: #e5e5e5;
                color: #0a0a0a;
            }
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid #e0e0e0;
            color: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            .btn.secondary {
                border-color: #333;
                color: #e5e5e5;
            }
        }

        .trips-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            margin-top: 1rem;
        }

        @media (prefers-color-scheme: dark) {
            .trips-list {
                border-color: #333;
            }
        }

        .trip-item {
            padding: 1rem;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        @media (prefers-color-scheme: dark) {
            .trip-item {
                border-bottom-color: #333;
            }
        }

        .trip-info {
            flex: 1;
        }

        .trip-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .trip-date {
            font-size: 12px;
            color: #999;
        }

        .trip-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .trip-actions .btn {
            padding: 6px 12px;
            margin: 0;
            font-size: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        input[type="file"] {
            display: none;
        }

        .file-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #1a1a1a;
            color: white;
            border: none;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
        }

        @media (prefers-color-scheme: dark) {
            .file-btn {
                background: #e5e5e5;
                color: #0a0a0a;
            }
        }

        /* Photo List in Admin */
        .photos-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 4px;
        }

        @media (prefers-color-scheme: dark) {
            .photos-list {
                background: #1a1a1a;
            }
        }

        .photo-admin-item {
            position: relative;
            aspect-ratio: 1;
            border: 2px solid #e0e0e0;
            overflow: hidden;
        }

        @media (prefers-color-scheme: dark) {
            .photo-admin-item {
                border-color: #333;
            }
        }

        .photo-admin-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-admin-item.cover {
            border: 2px solid #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            .photo-admin-item.cover {
                border-color: #e5e5e5;
            }
        }

        .photo-cover-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #1a1a1a;
            color: white;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: 700;
        }

        .photo-admin-item-btn {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 2px;
            font-size: 9px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 2px solid #1a1a1a;
                position: sticky;
                top: 0;
                z-index: 50;
                padding: 1rem 1.5rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            @media (prefers-color-scheme: dark) {
                .sidebar {
                    border-bottom-color: #333;
                }
            }

            .logo-container {
                margin-bottom: 0;
                flex: 1;
                max-width: 120px;
            }

            .logo-image {
                margin-bottom: 0.5rem;
            }

            .logo-text {
                font-size: 14px;
                margin-bottom: 0;
            }

            .profile-toggle {
                display: block;
                font-size: 18px;
                margin-left: 1rem;
            }

            .profile-section {
                display: none;
            }

            .profile-section.active {
                display: block;
            }

            .sidebar-btn {
                margin-top: 0;
                margin-left: 1rem;
                width: auto;
                padding: 8px 12px;
                font-size: 11px;
            }

            .main {
                margin-left: 0;
                padding: 1rem;
            }

            .header {
                margin-bottom: 1.5rem;
                padding-bottom: 1rem;
            }

            .header-title {
                font-size: 20px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.75rem;
            }

            .photo-detail-image-container {
                flex-direction: column;
                gap: 1rem;
            }

            .photo-nav-btn {
                padding: 0.75rem;
                font-size: 24px;
            }

            .photo-detail-image {
                max-width: 100%;
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-container">
            <img src="logo.png" alt="NAK NAK Logo" class="logo-image">
            <div class="logo-text">NAK NAK</div>
        </div>

        <div id="profileContent">
            <div class="profile-section">
                <div class="profile-label">이름</div>
                <div class="profile-value" id="profileName">낙낙</div>
                
                <div class="profile-label">소개</div>
                <div class="profile-value" id="profileBio" style="font-size: 12px; white-space: pre-wrap;">영어 교사 & 여행 기록자</div>
            </div>

            <div class="profile-section">
                <div class="profile-label">관심사</div>
                <div class="interests-tags" id="interestsTags"></div>
            </div>
        </div>

        <div class="profile-toggle" id="profileToggle">▼</div>
        <button class="sidebar-btn" onclick="openAdmin()">설정</button>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="header">
            <h1 class="header-title">갤러리</h1>
            <button class="header-btn" onclick="openAdmin()">관리</button>
        </div>

        <div class="gallery" id="gallery"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <p style="margin-bottom: 1rem;">아직 여행이 없어요</p>
            <p style="font-size: 12px; color: #bbb;">관리에서 새로운 여행을 추가해보세요!</p>
        </div>
    </div>

    <!-- Gallery Modal (Trip Photos) -->
    <div class="gallery-modal" id="galleryModal">
        <button class="gallery-modal-close" onclick="closeGallery()">✕</button>
        <div class="gallery-modal-title" id="galleryModalTitle">여행 제목</div>
        <div class="photo-grid" id="photoGrid"></div>
    </div>

    <!-- Photo Detail Modal -->
    <div class="photo-detail-modal" id="photoDetailModal">
        <button class="photo-detail-close" onclick="closePhotoDetail()">✕</button>
        <div class="photo-detail-content">
            <div class="photo-detail-image-container">
                <button class="photo-nav-btn" onclick="prevPhoto()" id="prevBtn">‹</button>
                <img src="" alt="Photo" class="photo-detail-image" id="photoDetailImage">
                <button class="photo-nav-btn" onclick="nextPhoto()" id="nextBtn">›</button>
            </div>
            <div class="photo-counter" id="photoCounter"></div>

            <div class="comments-section">
                <div class="comments-title">댓글</div>
                
                <div class="comment-input-group">
                    <input type="text" id="commentName" placeholder="이름" maxlength="20">
                </div>
                <textarea id="commentText" placeholder="댓글을 작성해주세요..." maxlength="500"></textarea>
                <button class="comment-submit-btn" onclick="addComment()">댓글 작성</button>

                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="modal" id="adminPanel">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAdmin()">✕</button>
            <div class="admin-title">관리자 패널</div>

            <!-- Profile Settings -->
            <div class="admin-section">
                <div class="admin-label">이름</div>
                <input type="text" id="inputName" placeholder="낙낙">
                
                <div class="admin-label">소개</div>
                <textarea id="inputBio" placeholder="영어 교사 & 여행 기록자"></textarea>
                
                <div class="admin-label">관심사 (쉼표로 구분)</div>
                <input type="text" id="inputInterests" placeholder="photography, travel, coffee">
                
                <button class="btn" onclick="saveProfile()">프로필 저장</button>
            </div>

            <!-- Trips Management -->
            <div class="admin-section">
                <div class="admin-label">새 여행 추가</div>
                <input type="text" id="newTripName" placeholder="여행 이름 (예: 일본 여행)">
                <button class="btn" onclick="addTrip()">여행 추가</button>

                <div style="margin-top: 1.5rem;">
                    <div class="admin-label">여행 목록</div>
                    <div class="trips-list" id="tripsList"></div>
                </div>
            </div>

            <!-- Photo Upload -->
            <div class="admin-section">
                <div class="admin-label">사진 업로드</div>
                <select id="tripSelect" style="margin-bottom: 1rem;">
                    <option value="">여행 선택</option>
                </select>
                <input type="file" id="photoInput" multiple accept="image/*" onchange="handlePhotoUpload()">
                <label for="photoInput" class="file-btn">사진 선택</label>
            </div>

            <!-- Settings -->
            <div class="admin-section">
                <button class="btn secondary" onclick="resetData()">모든 데이터 삭제</button>
            </div>
        </div>
    </div>

    <script>
        const initData = {
            profile: {
                name: '낙낙',
                bio: '영어 교사 & 여행 기록자',
                interests: ['photography', 'travel', 'teaching']
            },
            trips: [
                { id: 1, name: '일본 여행', date: 'Spring 2024', photos: [], coverPhotoIndex: 0, deleted: false, comments: {} },
                { id: 2, name: '제주도', date: 'Summer 2024', photos: [], coverPhotoIndex: 0, deleted: false, comments: {} }
            ]
        };

        let data = JSON.parse(localStorage.getItem('portfolioData')) || JSON.parse(JSON.stringify(initData));
        let currentTripId = null;
        let currentPhotoIndex = 0;

        function saveData() {
            localStorage.setItem('portfolioData', JSON.stringify(data));
            render();
        }

        function saveProfile() {
            data.profile.name = document.getElementById('inputName').value || '낙낙';
            data.profile.bio = document.getElementById('inputBio').value || '영어 교사 & 여행 기록자';
            data.profile.interests = document.getElementById('inputInterests').value
                .split(',')
                .map(i => i.trim())
                .filter(i => i);
            saveData();
            alert('프로필이 저장되었습니다!');
        }

        function addTrip() {
            const name = document.getElementById('newTripName').value.trim();
            if (!name) return;

            const newId = Math.max(...data.trips.map(t => t.id), 0) + 1;
            const today = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'short' });

            data.trips.push({
                id: newId,
                name: name,
                date: today,
                photos: [],
                coverPhotoIndex: 0,
                deleted: false,
                comments: {}
            });

            document.getElementById('newTripName').value = '';
            saveData();
        }

        function handlePhotoUpload() {
            const files = document.getElementById('photoInput').files;
            const tripId = parseInt(document.getElementById('tripSelect').value);

            if (!tripId) {
                alert('여행을 선택해주세요');
                return;
            }

            const trip = data.trips.find(t => t.id === tripId);
            if (!trip) return;

            let uploadedCount = 0;
            Array.from(files).forEach((file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    trip.photos.push(e.target.result);
                    uploadedCount++;
                    if (uploadedCount === Array.from(files).length) {
                        saveData();
                        document.getElementById('photoInput').value = '';
                        alert('사진이 업로드되었습니다!');
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function setCoverPhoto(tripId, photoIndex) {
            const trip = data.trips.find(t => t.id === tripId);
            if (trip) {
                trip.coverPhotoIndex = photoIndex;
                saveData();
            }
        }

        function deletePhoto(tripId, photoIndex) {
            const trip = data.trips.find(t => t.id === tripId);
            if (trip) {
                trip.photos.splice(photoIndex, 1);
                if (trip.coverPhotoIndex >= trip.photos.length) {
                    trip.coverPhotoIndex = Math.max(0, trip.photos.length - 1);
                }
                saveData();
                updateTripPhotos(tripId);
            }
        }

        function toggleDeleteTrip(tripId) {
            const trip = data.trips.find(t => t.id === tripId);
            if (trip) {
                trip.deleted = !trip.deleted;
                saveData();
            }
        }

        function render() {
            document.getElementById('profileName').textContent = data.profile.name;
            document.getElementById('profileBio').textContent = data.profile.bio;
            document.getElementById('interestsTags').innerHTML = data.profile.interests
                .map(interest => `<div class="interest-tag">${interest}</div>`)
                .join('');

            const gallery = document.getElementById('gallery');
            const emptyState = document.getElementById('emptyState');
            const activeTrips = data.trips.filter(t => !t.deleted);

            if (activeTrips.length === 0) {
                gallery.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                gallery.innerHTML = activeTrips.map(trip => {
                    const coverPhoto = trip.photos[trip.coverPhotoIndex];
                    return `
                        <div class="gallery-item" onclick="openGallery(${trip.id})">
                            ${coverPhoto ? 
                                `<img src="${coverPhoto}" alt="${trip.name}">` : 
                                `<div class="gallery-placeholder">📸</div>`
                            }
                            <div class="gallery-overlay">
                                <div class="gallery-info">
                                    <div class="gallery-title">${trip.name}</div>
                                    <div class="gallery-count">${trip.date} • ${trip.photos.length}장</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            updateTripsList();
            updateTripSelect();

            document.getElementById('inputName').value = data.profile.name;
            document.getElementById('inputBio').value = data.profile.bio;
            document.getElementById('inputInterests').value = data.profile.interests.join(', ');
        }

        function updateTripsList() {
            const list = document.getElementById('tripsList');
            list.innerHTML = data.trips.map(trip => `
                <div class="trip-item">
                    <div class="trip-info">
                        <div class="trip-name">${trip.name}</div>
                        <div class="trip-date">${trip.date} • ${trip.photos.length}장 ${trip.deleted ? '🗑️' : ''}</div>
                    </div>
                    <div class="trip-actions">
                        <button class="btn secondary" onclick="toggleDeleteTrip(${trip.id})">
                            ${trip.deleted ? '복원' : '삭제'}
                        </button>
                        <button class="btn secondary" onclick="managePhotos(${trip.id})">
                            사진관리
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateTripSelect() {
            const select = document.getElementById('tripSelect');
            const activeTrips = data.trips.filter(t => !t.deleted);
            select.innerHTML = '<option value="">여행 선택</option>' +
                activeTrips.map(trip => `<option value="${trip.id}">${trip.name}</option>`).join('');
        }

        function managePhotos(tripId) {
            const trip = data.trips.find(t => t.id === tripId);
            if (!trip) return;

            const photosHtml = trip.photos.map((photo, idx) => `
                <div class="photo-admin-item ${idx === trip.coverPhotoIndex ? 'cover' : ''}">
                    <img src="${photo}" alt="photo">
                    ${idx === trip.coverPhotoIndex ? '<div class="photo-cover-badge">대표</div>' : ''}
                    <button class="photo-admin-item-btn" onclick="setCoverPhoto(${tripId}, ${idx}); render();">대표사진</button>
                </div>
            `).join('');

            alert(`${trip.name}의 사진 관리:\n- 대표사진 버튼으로 대표사진을 선택할 수 있습니다.\n현재 ${trip.photos.length}장의 사진이 있습니다.`);
        }

        function updateTripPhotos(tripId) {
            managePhotos(tripId);
        }

        function openGallery(tripId) {
            currentTripId = tripId;
            const trip = data.trips.find(t => t.id === tripId);
            if (!trip) return;

            document.getElementById('galleryModalTitle').textContent = trip.name;
            document.getElementById('photoGrid').innerHTML = trip.photos.length === 0 ?
                '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #999;">아직 사진이 없어요</div>' :
                trip.photos.map((photo, idx) => `
                    <div class="photo-item" onclick="openPhotoDetail(${tripId}, ${idx})">
                        <img src="${photo}" alt="photo">
                    </div>
                `).join('');

            document.getElementById('galleryModal').classList.add('active');
        }

        function closeGallery() {
            document.getElementById('galleryModal').classList.remove('active');
        }

        function openPhotoDetail(tripId, photoIndex) {
            currentTripId = tripId;
            currentPhotoIndex = photoIndex;
            const trip = data.trips.find(t => t.id === tripId);
            if (!trip || !trip.photos[photoIndex]) return;

            document.getElementById('photoDetailImage').src = trip.photos[photoIndex];
            updatePhotoCounter();
            loadComments();
            updateNavButtons();

            document.getElementById('photoDetailModal').classList.add('active');
        }

        function closePhotoDetail() {
            document.getElementById('photoDetailModal').classList.remove('active');
        }

        function updatePhotoCounter() {
            const trip = data.trips.find(t => t.id === currentTripId);
            if (trip) {
                document.getElementById('photoCounter').textContent = `${currentPhotoIndex + 1} / ${trip.photos.length}`;
            }
        }

        function updateNavButtons() {
            const trip = data.trips.find(t => t.id === currentTripId);
            if (!trip) return;
            
            document.getElementById('prevBtn').disabled = currentPhotoIndex === 0;
            document.getElementById('nextBtn').disabled = currentPhotoIndex === trip.photos.length - 1;
        }

        function prevPhoto() {
            if (currentPhotoIndex > 0) {
                currentPhotoIndex--;
                const trip = data.trips.find(t => t.id === currentTripId);
                document.getElementById('photoDetailImage').src = trip.photos[currentPhotoIndex];
                updatePhotoCounter();
                loadComments();
                updateNavButtons();
            }
        }

        function nextPhoto() {
            const trip = data.trips.find(t => t.id === currentTripId);
            if (currentPhotoIndex < trip.photos.length - 1) {
                currentPhotoIndex++;
                document.getElementById('photoDetailImage').src = trip.photos[currentPhotoIndex];
                updatePhotoCounter();
                loadComments();
                updateNavButtons();
            }
        }

        function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const text = document.getElementById('commentText').value.trim();

            if (!name || !text) {
                alert('이름과 댓글을 입력해주세요');
                return;
            }

            const trip = data.trips.find(t => t.id === currentTripId);
            if (!trip) return;

            const photoKey = `photo_${currentPhotoIndex}`;
            if (!trip.comments[photoKey]) {
                trip.comments[photoKey] = [];
            }

            trip.comments[photoKey].push({
                id: Date.now(),
                name: name,
                text: text,
                date: new Date().toLocaleString('ko-KR')
            });

            saveData();
            document.getElementById('commentName').value = '';
            document.getElementById('commentText').value = '';
            loadComments();
        }

        function deleteComment(commentId) {
            const trip = data.trips.find(t => t.id === currentTripId);
            if (!trip) return;

            const photoKey = `photo_${currentPhotoIndex}`;
            if (trip.comments[photoKey]) {
                trip.comments[photoKey] = trip.comments[photoKey].filter(c => c.id !== commentId);
                saveData();
                loadComments();
            }
        }

        function loadComments() {
            const trip = data.trips.find(t => t.id === currentTripId);
            if (!trip) return;

            const photoKey = `photo_${currentPhotoIndex}`;
            const comments = trip.comments[photoKey] || [];
            const commentsList = document.getElementById('commentsList');

            if (comments.length === 0) {
                commentsList.innerHTML = '<div style="text-align: center; color: #999; padding: 1rem;">아직 댓글이 없어요</div>';
                return;
            }

            commentsList.innerHTML = comments.map(comment => `
                <div class="comment-item">
                    <div class="comment-author">${comment.name}</div>
                    <div class="comment-text">${comment.text.replace(/\n/g, '<br>')}</div>
                    <div class="comment-delete" onclick="deleteComment(${comment.id})">삭제</div>
                </div>
            `).join('');
        }

        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
        }

        function resetData() {
            if (confirm('정말 모든 데이터를 삭제하시겠습니까?')) {
                localStorage.removeItem('portfolioData');
                data = JSON.parse(JSON.stringify(initData));
                saveData();
                closeAdmin();
                alert('모든 데이터가 삭제되었습니다.');
            }
        }

        // Mobile Profile Toggle
        document.getElementById('profileToggle').addEventListener('click', () => {
            const content = document.getElementById('profileContent');
            content.classList.toggle('active');
            const toggle = document.getElementById('profileToggle');
            toggle.textContent = content.classList.contains('active') ? '▲' : '▼';
        });

        document.getElementById('galleryModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('galleryModal')) closeGallery();
        });

        document.getElementById('photoDetailModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('photoDetailModal')) closePhotoDetail();
        });

        document.getElementById('adminPanel').addEventListener('click', (e) => {
            if (e.target === document.getElementById('adminPanel')) closeAdmin();
        });

        render();
    </script>
</body>
</html>
